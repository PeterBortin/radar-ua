<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0c10">
<title>radar-ua — Симулятор ППО/ПРО</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  :root{
    --primary:#00ff88; --bg:#0a0c10; --panel:rgba(15,20,30,.7);
    --ua-gold:#ffd700; --ru-red:#ff4444; --sea:#0088ff; --mobile:#e1ff00;
    --detect:#3aa0ff; --sensor:#9b59ff; --jam:#ff9f1c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body,html{height:100%;width:100%;margin:0;background:var(--bg);color:#fff;
    font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;
    -webkit-user-select:none;user-select:none;overscroll-behavior:none}
  #map{position:absolute;inset:0;z-index:1;
    background:var(--bg) repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 48px),
               repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0 1px,transparent 1px 48px)}
  .leaflet-container{background:transparent}
  button{touch-action:manipulation}

  .radar-container{display:flex;align-items:center;justify-content:center;pointer-events:none}
  .radar-sweep{position:absolute;border-radius:50%;
    background:conic-gradient(from 0deg at 50% 50%,rgba(0,255,136,.15) 0deg,transparent 90deg);
    animation:sweep 4s linear infinite;pointer-events:none;will-change:transform}
  @keyframes sweep{from{transform:rotate(360deg)}to{transform:rotate(0)}}

  .obj-toolbar{position:absolute;background:var(--panel);padding:3px 7px;
    backdrop-filter:blur(4px);border-radius:4px;font-family:'Roboto Mono',monospace;
    font-size:10px;pointer-events:none;z-index:9000;transform:translate(14px,-14px);
    white-space:nowrap;border:1px solid rgba(255,255,255,.08);line-height:1.35}
  .obj-toolbar .reload{color:var(--ru-red)}
  .obj-toolbar .ok{color:var(--primary)}

  .explosion{position:absolute;width:60px;height:60px;border-radius:50%;z-index:9100;
    background:radial-gradient(circle,#fff 10%,#ff4444 30%,transparent 70%);
    animation:explode .5s ease-out forwards;pointer-events:none;transform:translate(-50%,-50%)}
  @keyframes explode{0%{transform:translate(-50%,-50%) scale(0);opacity:1}
    100%{transform:translate(-50%,-50%) scale(3);opacity:0}}

  .map-note{position:absolute;padding:6px 12px;border-radius:4px;font-size:10px;font-weight:700;
    text-transform:uppercase;white-space:nowrap;z-index:9200;pointer-events:none;
    animation:floatUp 3s ease-out forwards;border:1px solid rgba(255,255,255,.2);
    box-shadow:0 4px 15px rgba(0,0,0,.5);backdrop-filter:blur(4px)}
  @keyframes floatUp{0%{transform:translate(-50%,0);opacity:0}
    10%{transform:translate(-50%,-20px);opacity:1}80%{opacity:1}
    100%{transform:translate(-50%,-60px);opacity:0}}

  .target-undetected{opacity:.35;filter:grayscale(.6)}
  .target-detected{opacity:1}

  .status-header{position:absolute;top:0;left:0;width:100%;z-index:8000;
    background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);
    padding:10px 12px;display:flex;justify-content:center;gap:16px;flex-wrap:wrap;pointer-events:none}
  .status-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700}

  .ui-layer{position:absolute;top:64px;width:100%;z-index:7900;display:flex;
    flex-direction:column;align-items:center;gap:10px;pointer-events:none}
  .ui-layer>*{pointer-events:auto}
  .cards{display:flex;gap:14px;width:95%;max-width:640px}
  .tool-card{background:var(--panel);border:1px solid rgba(255,255,255,.1);border-radius:12px;
    padding:10px;flex:1;cursor:pointer;backdrop-filter:blur(10px)}
  .tool-card.active{border-color:var(--primary)}
  #targetCard.active{border-color:#fff}
  .tool-card .lbl{font-size:11px;display:block;margin-bottom:7px;color:#9aa}
  select{background:#1a222d;color:#fff;border:1px solid #444;padding:8px;border-radius:6px;
    width:100%;outline:none;font-size:12px}
  optgroup{background:#0a0c10;color:#889;font-weight:700}
  option{color:#fff;background:#1a222d}

  .bottom-nav{position:absolute;bottom:calc(26px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    display:flex;align-items:flex-end;justify-content:center;gap:13px;z-index:8100}
  .btn{width:52px;height:52px;border-radius:50%;border:none;color:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:19px;background:#444;
    transition:all .2s;box-shadow:0 4px 10px rgba(0,0,0,.3);flex-shrink:0}
  .btn:active{transform:scale(.9)} .btn:hover{background:#555}
  #playBtn{background:#fff;color:#333}
  #playBtn.sim{background:#333;color:var(--primary);border:2px solid var(--primary)}
  #playBtn.confirm{background:var(--primary)!important;color:#000!important;transform:scale(1.15);
    box-shadow:0 0 20px rgba(0,255,136,.4)}
  .btn-undo{background:#6c757d;opacity:.3;pointer-events:none}
  .btn-undo.show{opacity:1;pointer-events:auto}
  .btn-attack{background:#8b0000;color:#fff;border:2px solid var(--ru-red)!important;display:none;
    animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,68,68,.7)}70%{box-shadow:0 0 0 10px rgba(255,68,68,0)}
    100%{box-shadow:0 0 0 0 rgba(255,68,68,0)}}
  .btn-attack:disabled{background:#222;border-color:#444!important;opacity:.5;cursor:not-allowed;animation:none}
  .stack{display:flex;flex-direction:column;align-items:center;gap:9px}
  .btn-loc{background:#2c3e50} .btn-hist{background:#444} .btn-hist.active{background:#fff;color:#333}

  /* AI + lang chips top-right */
  .toprt{position:absolute;top:12px;right:12px;z-index:8050;display:flex;gap:8px;align-items:center}
  .chip{background:var(--panel);border:1px solid rgba(255,255,255,.15);border-radius:20px;
    padding:6px 11px;font-size:10px;font-weight:700;cursor:pointer;backdrop-filter:blur(8px);
    text-transform:uppercase;letter-spacing:.5px;user-select:none}
  .chip.on{border-color:var(--primary);color:var(--primary)}
  .chip i{margin-right:5px}

  /* panels */
  .panel{position:absolute;bottom:92px;left:50%;transform:translateX(-50%);width:92%;max-width:600px;
    max-height:46vh;background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.1);border-radius:12px;z-index:8090;padding:14px;
    display:none;flex-direction:column;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .panel.active{display:flex}
  .panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
    border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:8px}
  .panel-head b{font-size:11px;letter-spacing:1px}
  .panel-body{overflow-y:auto;flex:1;scrollbar-width:thin}

  table{width:100%;border-collapse:collapse;font-size:11px}
  th{text-align:left;color:#889;padding:7px;border-bottom:1px solid rgba(255,255,255,.1);
    text-transform:uppercase;letter-spacing:1px;font-size:9px}
  tr{cursor:pointer} tr:hover{background:rgba(255,255,255,.05)}
  td{padding:7px;border-bottom:1px solid rgba(255,255,255,.05)}
  .badge{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase}
  .b-intercept{background:rgba(0,255,136,.2);color:var(--primary);border:1px solid var(--primary)}
  .b-launch{background:rgba(255,215,0,.2);color:var(--ua-gold);border:1px solid var(--ua-gold)}
  .b-hit{background:rgba(255,68,68,.2);color:var(--ru-red);border:1px solid var(--ru-red)}
  .b-deploy{background:rgba(0,136,255,.2);color:var(--sea);border:1px solid var(--sea)}
  .b-miss{background:rgba(255,159,28,.2);color:var(--jam);border:1px solid var(--jam)}

  /* dashboard */
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
    border-radius:8px;padding:10px}
  .stat .k{font-size:9px;color:#889;text-transform:uppercase;letter-spacing:1px}
  .stat .v{font-size:20px;font-weight:800;margin-top:3px}
  .bar{height:6px;border-radius:3px;background:rgba(255,255,255,.1);margin-top:6px;overflow:hidden}
  .bar>span{display:block;height:100%;border-radius:3px}

  /* disclaimer */
  #intro{position:absolute;inset:0;z-index:9999;background:rgba(5,7,10,.94);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;padding:26px;text-align:center}
  #intro h1{margin:0;font-size:22px;letter-spacing:1px}
  #intro p{max-width:440px;color:#aab;font-size:13px;line-height:1.6;margin:0}
  #intro .go{background:var(--primary);color:#000;border:none;border-radius:8px;
    padding:12px 26px;font-weight:800;cursor:pointer;font-size:14px}
  #intro .lang{display:flex;gap:10px}
  .rotated-icon{display:flex;align-items:center;justify-content:center;width:30px;height:30px;
    transform-origin:center;will-change:transform}

  /* target engagement state */
  .target-engaged{animation:tgtPulse 1s ease-in-out infinite}
  @keyframes tgtPulse{0%,100%{filter:drop-shadow(0 0 2px #ffbb33)}50%{filter:drop-shadow(0 0 7px #ffbb33)}}

  /* smooth touch scrolling inside panels */
  .panel-body{-webkit-overflow-scrolling:touch;touch-action:pan-y}
  .status-header{padding-top:calc(10px + env(safe-area-inset-top))}
  .toprt{top:calc(12px + env(safe-area-inset-top))}

  /* narrow phones */
  @media (max-width:430px){
    .status-header{gap:9px;padding-left:8px;padding-right:8px}
    .status-item{font-size:10px;gap:4px}
    .ui-layer{top:54px}
    .cards{gap:9px;width:96%}
    .tool-card{padding:8px}
    .btn{width:46px;height:46px;font-size:17px}
    .panel{max-height:42vh;width:94%}
    .obj-toolbar{font-size:9px}
    .chip{padding:5px 9px;font-size:9px}
  }
  @media (max-height:520px){
    .ui-layer{top:48px}
    .bottom-nav{bottom:calc(12px + env(safe-area-inset-bottom));gap:9px}
    .btn{width:44px;height:44px}
  }
</style>
</head>
<body onclick="Snd.init()">
<div id="map"></div>

<div id="intro">
  <h1>radar-ua</h1>
  <p data-i18n="disclaimer"></p>
  <div class="lang">
    <button class="chip" onclick="setLang('uk');closeIntro()">Українська</button>
    <button class="chip" onclick="setLang('en');closeIntro()">English</button>
  </div>
</div>

<div class="status-header">
  <div class="status-item"><i class="far fa-clock"></i> <span id="simTime">00:00:00</span></div>
  <div class="status-item"><i class="fas fa-bullseye"></i> <span id="cAir">0</span></div>
  <div class="status-item"><i class="fas fa-shield-alt"></i> <span id="cSam">0</span></div>
  <div class="status-item"><i class="fas fa-satellite-dish" style="color:var(--sensor)"></i> <span id="cSensor">0</span></div>
  <div class="status-item"><i class="fas fa-check-double" style="color:var(--primary)"></i> <span id="cKill">0</span></div>
  <div class="status-item"><i class="fas fa-bomb" style="color:var(--ru-red)"></i> <span id="cLeak">0</span></div>
</div>

<div class="toprt">
  <div class="chip" id="aiChip" onclick="toggleAI()"><i class="fas fa-brain"></i><span data-i18n="ai"></span></div>
  <div class="chip" id="langChip" onclick="cycleLang()"><i class="fas fa-globe"></i><span id="langLbl">UA</span></div>
</div>

<div class="ui-layer">
  <div class="cards">
    <div class="tool-card active" id="defCard" onclick="setMode('def')">
      <span class="lbl" data-i18n="defenceLbl"></span>
      <select id="defSelect" onchange="Snd.ping();onDefChange()"></select>
    </div>
    <div class="tool-card" id="targetCard" onclick="setMode('target')">
      <span class="lbl" data-i18n="targetLbl"></span>
      <select id="targetSelect" onchange="Snd.ping()"></select>
    </div>
  </div>
</div>

<div id="histPanel" class="panel">
  <div class="panel-head"><b data-i18n="journal"></b><span style="font-size:9px;color:#889" data-i18n="journalHint"></span></div>
  <div class="panel-body">
    <table><thead><tr><th data-i18n="thTime"></th><th data-i18n="thObj"></th><th data-i18n="thEvent"></th><th data-i18n="thLoc"></th></tr></thead>
    <tbody id="histBody"></tbody></table>
  </div>
</div>

<div id="dashPanel" class="panel">
  <div class="panel-head"><b data-i18n="dashboard"></b><span style="font-size:9px;color:#889" data-i18n="dashHint"></span></div>
  <div class="panel-body">
    <div class="dash-grid">
      <div class="stat"><div class="k" data-i18n="dInterceptRate"></div><div class="v" id="dRate">—</div>
        <div class="bar"><span id="dRateBar" style="width:0;background:var(--primary)"></span></div></div>
      <div class="stat"><div class="k" data-i18n="dLeaked"></div><div class="v" id="dLeak" style="color:var(--ru-red)">0</div></div>
      <div class="stat"><div class="k" data-i18n="dShots"></div><div class="v" id="dShots">0</div></div>
      <div class="stat"><div class="k" data-i18n="dChannels"></div><div class="v" id="dChan">0/0</div>
        <div class="bar"><span id="dChanBar" style="width:0;background:var(--jam)"></span></div></div>
      <div class="stat" style="grid-column:1/3"><div class="k" data-i18n="dCost"></div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:4px">
          <span style="font-size:16px;font-weight:800;color:var(--ua-gold)" id="dCostDef">$0M</span>
          <span style="font-size:11px;color:#889" data-i18n="dVs"></span>
          <span style="font-size:16px;font-weight:800;color:var(--ru-red)" id="dCostThreat">$0M</span>
        </div>
        <div style="font-size:9px;color:#889;margin-top:4px" id="dCostNote"></div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="stack">
    <button class="btn btn-loc" onclick="locateUser()" title="loc"><i class="fas fa-crosshairs"></i></button>
    <button class="btn" onclick="toggleMapLayer()" title="layer"><i class="fas fa-layer-group"></i></button>
  </div>
  <div class="stack">
    <button class="btn" onclick="Snd.ping();saveLayout()" title="save"><i class="fas fa-download"></i></button>
    <button class="btn" onclick="Snd.ping();document.getElementById('loadFile').click()" title="load"><i class="fas fa-upload"></i></button>
  </div>
  <button class="btn btn-undo" id="undoBtn" onclick="undoLast()"><i class="fas fa-undo"></i></button>
  <div class="stack">
    <button class="btn btn-attack" id="attackBtn" onclick="triggerWave()" title="wave"><i class="fas fa-radiation"></i></button>
    <button class="btn" id="playBtn"><i class="fas fa-play"></i></button>
  </div>
  <div class="stack">
    <button class="btn" onclick="toggleDash()" id="dashBtn" title="dash"><i class="fas fa-chart-line"></i></button>
    <button class="btn btn-hist" id="histBtn" onclick="toggleHist()"><i class="fas fa-list-ul"></i></button>
  </div>
</div>
<input type="file" id="loadFile" accept=".json" style="display:none" onchange="loadLayout(event)">

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ============================================================
   radar-ua — навчальний симулятор ППО/ПРО (one-file, modular)
   Модулі: I18N · CONFIG · Phys · Snd · State · Render · Combat · UI
   Усі ТТХ — орієнтовні відкриті значення для навчального балансу.
   ============================================================ */

/* ---------- I18N ---------- */
const I18N = {
  uk:{
    disclaimer:"Навчально-демонстраційна візуалізація ешелонованої ППО/ПРО. Усі характеристики — орієнтовні, з відкритих джерел, і призначені лише для освітнього контексту.",
    ai:"АІ-розподіл", defenceLbl:"Сили оборони України", targetLbl:"Цілі (симуляція)",
    journal:"ЖУРНАЛ ПОДІЙ", journalHint:"Натисніть рядок для переходу",
    thTime:"Час", thObj:"Об'єкт", thEvent:"Подія", thLoc:"Локація",
    dashboard:"ДАШБОРД БОЮ", dashHint:"Підсумок поточного бою",
    dInterceptRate:"Перехоплення", dLeaked:"Прорвалось", dShots:"Витрачено ракет",
    dChannels:"Канали наведення", dCost:"Вартісний обмін (умовно)", dVs:"проти",
    dCostNote:"Скільки коштувало відбиття vs вартість цілей",
    st_deploy:"Розгорнуто", st_launch:"Пуск", st_intercept:"Збито", st_hit:"Влучання", st_miss:"Промах", st_ew:"РЕБ: втрачено",
    n_deployed:"РОЗГОРНУТО", n_onlyLand:"ПОМИЛКА: ЛИШЕ НА СУШІ", n_onlyWater:"ПОМИЛКА: ЛИШЕ НА ВОДІ",
    n_route:"ВКАЖІТЬ МАРШРУТ (2+ ТОЧКИ)", n_patrol:"ВИЙШЛА НА ПАТРУЛЬ", n_takeoff:"ЗЛІТ",
    n_launched:"СПУЩЕНО", n_simOn:"СИМУЛЯЦІЮ ЗАПУЩЕНО", n_pause:"ПАУЗА",
    n_range:"ПЕРЕВИЩЕНО ДАЛЬНІСТЬ", n_pos:"ВАША ПОЗИЦІЯ", n_geoErr:"ГЕОПОЗИЦІЯ НЕДОСТУПНА",
    n_wave:"МАСОВАНИЙ УДАР: ХВИЛЯ", n_hit:"ПРИЛІТ", n_killed:"ЗБИТО", n_lostEW:"ВТРАЧЕНО (РЕБ)",
    n_noDetect:"ЦІЛЬ НИЖЧЕ РАДІОГОРИЗОНТУ", n_saved:"РОЗКЛАДКУ ЗБЕРЕЖЕНО", n_loaded:"РОЗКЛАДКУ ЗАВАНТАЖЕНО",
    tip_spd:"ШВ", tip_alt:"ВИС", tip_ammo:"БК", tip_reload:"ПЕРЕЗАРЯДКА", tip_detected:"ВИЯВЛЕНО"
  },
  en:{
    disclaimer:"Educational visualisation of layered air & missile defence. All figures are approximate, from open sources, and intended for educational context only.",
    ai:"AI assign", defenceLbl:"Ukrainian defence forces", targetLbl:"Targets (simulation)",
    journal:"EVENT LOG", journalHint:"Tap a row to fly to it",
    thTime:"Time", thObj:"Object", thEvent:"Event", thLoc:"Location",
    dashboard:"BATTLE DASHBOARD", dashHint:"Current engagement summary",
    dInterceptRate:"Intercept rate", dLeaked:"Leaked", dShots:"Interceptors fired",
    dChannels:"Guidance channels", dCost:"Cost exchange (relative)", dVs:"vs",
    dCostNote:"Cost to defend vs cost of incoming threats",
    st_deploy:"Deployed", st_launch:"Launch", st_intercept:"Killed", st_hit:"Impact", st_miss:"Miss", st_ew:"EW: lost",
    n_deployed:"DEPLOYED", n_onlyLand:"ERROR: LAND ONLY", n_onlyWater:"ERROR: WATER ONLY",
    n_route:"SET A ROUTE (2+ POINTS)", n_patrol:"ON PATROL", n_takeoff:"TAKEOFF",
    n_launched:"LAUNCHED", n_simOn:"SIMULATION STARTED", n_pause:"PAUSED",
    n_range:"RANGE EXCEEDED", n_pos:"YOUR POSITION", n_geoErr:"GEOLOCATION UNAVAILABLE",
    n_wave:"MASS STRIKE: WAVE", n_hit:"IMPACT", n_killed:"KILLED", n_lostEW:"LOST (EW)",
    n_noDetect:"TARGET BELOW RADAR HORIZON", n_saved:"LAYOUT SAVED", n_loaded:"LAYOUT LOADED",
    tip_spd:"SPD", tip_alt:"ALT", tip_ammo:"AMMO", tip_reload:"RELOADING", tip_detected:"DETECTED"
  }
};
let LANG = 'uk';
const t = k => (I18N[LANG][k] ?? I18N.uk[k] ?? k);
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  document.getElementById('langLbl').textContent = LANG==='uk'?'UA':'EN';
}
function setLang(l){ LANG=l; applyI18n(); buildSelectors(); }
function cycleLang(){ Snd.ping(); setLang(LANG==='uk'?'en':'uk'); }
function closeIntro(){ Snd.init(); document.getElementById('intro').style.display='none'; }

/* ---------- CONFIG (data layer) ----------
   Класи цілей: drone | cruise | ballistic | hypersonic
   Поля систем: detect (км РЛС) · kill (км ураження) · ch (канали) ·
                ammo/mag (боєкомплект) · reload (сек) · pk (база) ·
                eng (які класи б'є) · h (висота РЛС, м) · cost (умовна) · abm
*/
const CONFIG = {
  groups_def:[
    {lbl:{uk:"Далекої / середньої дії",en:"Long / medium range"}, items:["d_patriot","d_samp","d_s300","d_iris","d_nasams","d_buk"]},
    {lbl:{uk:"Малої дії / анти-дрон",en:"Short range / anti-drone"}, items:["d_gepard","d_skynex","d_vampire","d_mrg"]},
    {lbl:{uk:"Сенсори та РЕБ (нове)",en:"Sensors & EW (new)"}, items:["d_acoustic","d_jammer","d_idrone"]},
    {lbl:{uk:"Вертольоти / авіація",en:"Helicopters / aircraft"}, items:["d_mi8","d_mi24","d_f16","d_f15","d_mig29"]},
    {lbl:{uk:"Морський щит",en:"Naval shield"}, items:["d_hetman","d_island"]}

/* ---------- PHYSICS (pure) ---------- */
const Phys = {
  radioHorizonKm(hRadarM,hTargetM){ return 4.12*(Math.sqrt(Math.max(0,hRadarM))+Math.sqrt(Math.max(0,hTargetM))); },
  // effective detection range for a system vs target (km)
  effDetect(sys,tgt){
    if(sys.type==='sensor') return sys.cfg.detect; // acoustic: not radio-horizon limited
    const horizon = this.radioHorizonKm(sys.cfg.h||15, tgt.altitude||0);
    return Math.min(sys.cfg.detect, horizon) * (tgt.cfg.det||1);
  },
  // probability of kill at intercept
  pk(sys,tgt,rangeKm){
    let pk = sys.cfg.pk;
    const kr = sys.cfg.kill||1;
    pk *= 1 - 0.4*Math.min(1, rangeKm/kr);            // edge of envelope
    if(tgt.cls==='hypersonic') pk *= sys.cfg.abm?0.55:0.04;
    else if(tgt.cls==='ballistic') pk *= sys.cfg.abm?0.85:0.18;
    else if(tgt.speed>2500) pk *= sys.cfg.abm?0.9:0.45; // supersonic cruise
    if(sys._jammed) pk *= 0.6;
    if(sys._sat) pk *= sys._sat;          // §4.6 saturation penalty
    return Math.max(.02, Math.min(.98, pk));
  },
  heading(p1,p2){
    if(!p1||!p2) return 0;
    const la1=p1[0]*Math.PI/180, la2=p2[0]*Math.PI/180, lo1=p1[1]*Math.PI/180, lo2=p2[1]*Math.PI/180;
    const y=Math.sin(lo2-lo1)*Math.cos(la2);
    const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(lo2-lo1);
    return (Math.atan2(y,x)*180/Math.PI+360)%360;
  },
  interp(path,distKm){
    let acc=0;
    for(let i=0;i<path.length-1;i++){
      const d=map.distance(path[i],path[i+1])/1000;
      if(acc+d>distKm){const r=(distKm-acc)/d;return [path[i][0]+(path[i+1][0]-path[i][0])*r, path[i][1]+(path[i+1][1]-path[i][1])*r];}
      acc+=d;
    }
    return path[path.length-1];
  }
};

/* ---------- AUDIO ---------- */
const Snd={ctx:null,
  init(){ if(!this.ctx){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();},
  osc(f,ty,d,v){ if(!this.ctx)return; const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=ty;o.frequency.setValueAtTime(f,this.ctx.currentTime);g.gain.setValueAtTime(v,this.ctx.currentTime);
    g.gain.setTargetAtTime(.0001,this.ctx.currentTime,d/3);o.connect(g);g.connect(this.ctx.destination);
    o.start();o.stop(this.ctx.currentTime+d);},
  launch(){this.init();this.osc(300,'sawtooth',.4,.05);},
  intercept(){this.init();this.osc(60,'sine',.8,.3);},
  hit(){this.init();this.osc(40,'triangle',1,.4);},
  ping(){this.init();this.osc(1000,'sine',.05,.02);},
  warn(){this.init();this.osc(120,'square',.5,.1);},
  alert(){this.init();this.osc(800,'sawtooth',.1,.05);setTimeout(()=>this.osc(600,'sawtooth',.1,.05),100);}
};

function deploy(pos){
  const id=document.getElementById('defSelect').value, c=CONFIG.def[id];
  if(c.type==='ship'){ if(!isWater(pos[0],pos[1])){note(pos,t('n_onlyWater'),'#ff4444');Snd.warn();return;} return mkMobile(pos,c,'ship',CL.gold); }
  const landLocked = !['fighter','hub'].includes(c.type);
  if(landLocked && isWater(pos[0],pos[1])){note(pos,t('n_onlyLand'),'#ff4444');Snd.warn();return;}
  if(c.type==='mrg'){ if(state.pending.length<2){note(pos,t('n_route'),CL.mobile);Snd.ping();return;} return mkMRG(c); }
  if(c.type==='fighter') return mkMobile(pos,c,'fighter',CL.gold);
  if(c.type==='sensor') return mkStatic(pos,c,'sensor',CL.sensor,'fa-satellite-dish');
  if(c.type==='jammer') return mkStatic(pos,c,'jammer',CL.jam,'fa-tower-broadcast');
  if(c.type==='hub') return mkStatic(pos,c,'hub',CL.primary,'fa-crosshairs');
  return mkSAM(pos,c);
}

/* ---------- COMBAT ---------- */
function nearestDefendable(){return [50.45,30.52];} // Kyiv as reference for AI threat scoring
function threatScore(tgt){
  const clsW={hypersonic:4,ballistic:3.5,cruise:2,drone:1}[tgt.cls]||1;
  const rem=Math.max(.1,tgt.total-tgt.prog);
  const tImpact=rem/Math.max(1,tgt.curSpeed||tgt.speed); // hours to impact, smaller = more urgent
  return clsW/ (tImpact+0.001);
}
function activeChannels(sys){return state.missiles.filter(m=>m.launcherId===sys.id&&m.target.active).length;}
function canEngage(sys,tgt){
  if(!tgt.active||!tgt.detected)return false;
  if(!sys.cfg.eng.includes(tgt.cls))return false;
  if(tgt.engagedBy.has(sys.id))return false;
  if(sys.ammo<=0)return false;
  if(sys.reloadUntil>state.simSeconds)return false;
  const center=sys.pos||sys.currentPos;
  return map.distance(center,tgt.currentPos)/1000 < sys.cfg.kill;
}
function tryEngage(sys){
  if(sys.ammo<=0 && sys.reloadUntil && state.simSeconds>=sys.reloadUntil){sys.ammo=sys.cfg.mag;sys.reloadUntil=0;}
  const free=(sys.cfg.ch||1)-activeChannels(sys);
  if(free<=0)return;
  let cand=state.targets.filter(tt=>canEngage(sys,tt));
  if(cand.length===0)return;
  cand.sort((a,b)=> state.ai ? threatScore(b)-threatScore(a)
    : map.distance(sys.pos||sys.currentPos,a.currentPos)-map.distance(sys.pos||sys.currentPos,b.currentPos));
  for(let i=0;i<Math.min(free,cand.length);i++){
    const tt=cand[i]; tt.engagedBy.add(sys.id); sys.ammo--;
    if(sys.ammo<=0) sys.reloadUntil=state.simSeconds+(sys.cfg.reload||60);
    launchInterceptor(sys,tt);
  }
}
function launchInterceptor(sys,tgt){
  Snd.launch();
  const start=sys.pos||sys.currentPos;
  const m={launcherId:sys.id,launcher:sys,target:tgt,pos:[...start],history:[[...start]],
    speed:sys.cfg.mSpeed||4000,curSpeed:(sys.cfg.mSpeed||4000)*.5,tb:tbEl(),
    marker:L.marker(start,{icon:L.divIcon({html:`<div class="rotated-icon"><i class="fas fa-location-arrow" style="color:#ffbb33;font-size:12px"></i></div>`,className:'event-marker'})}).addTo(map),
    line:L.polyline([start],{color:'#ffbb33',weight:1,opacity:.8}).addTo(map)};
  m.tb.style.fontSize='8px';m.tb.innerHTML=sys.cfg.m||'SAM';
  state.missiles.push(m); state.stats.shots++; state.stats.costDef+=sys.cfg.cost||0;
}

/* ---------- SIM LOOP ---------- */
function simLoop(time){
  if(!state.sim){syncTb();clock();return;}
  const dt=(time-state.lastFrame)/1000; state.lastFrame=time;
  const hStep=(dt*state.tc)/3600;

  // detection pass + jammer flag
  state.def.forEach(s=>s._jammed=false);
  state.targets.forEach(tg=>{
    if(!tg.active)return;
    let det=false;
    for(const s of state.def){
      if(s.type==='hub')continue;
      const center=s.pos||s.currentPos; if(!center)continue;
      const d=map.distance(center,tg.currentPos)/1000;
      if(s.type==='sensor'){ if(tg.cls==='drone'&&d<s.cfg.detect)det=true; continue; }
      if(s.type==='jammer'){ if(tg.cfg.gps&&d<s.cfg.detect){tg._inJam=true;} continue; }
      if(d<Phys.effDetect(s,tg))det=true;
    }
    if(det&&!tg.detected){tg.detected=true;tg.marker.getElement()?.querySelector('.rotated-icon')?.classList.replace('target-undetected','target-detected');}
  });

  // EW: drones in jammer field have a chance to be lost
  state.targets.forEach(tg=>{
    if(tg.active&&tg._inJam&&tg.cfg.gps){
      if(Math.random()<0.02*state.tc){ addHist(tg.name,'ew',tg.currentPos); note(tg.currentPos,t('n_lostEW'),'var(--jam)'); removeObj(tg,true);}
    }
    tg._inJam=false;
  });

  // saturation (§4.6): fire unit overwhelmed when in-range engageable targets exceed channels
  state.def.forEach(s=>{
    if(!['sam','mrg','fighter','ship','hub'].includes(s.type)){s._sat=1;return;}
    const center=s.pos||s.currentPos; if(!center){s._sat=1;return;}
    const reach=s.cfg.detect||s.cfg.kill||10;
    let n=0;
    state.targets.forEach(tg=>{if(tg.active&&tg.detected&&s.cfg.eng.includes(tg.cls)
      &&map.distance(center,tg.currentPos)/1000<reach)n++;});
    const ch=s.cfg.ch||1;
    s._sat = n>ch ? Math.max(.5, ch/n) : 1;
  });

  // targets move
  state.targets.forEach(tg=>{
    if(!tg.active)return; const prev=[...tg.currentPos];
    const rem=tg.total-tg.prog;
    if(tg.prog<5){tg.curSpeed=Math.min(tg.speed,tg.curSpeed+8000*hStep*10);tg.altitude=Math.min(tg.targetAlt,tg.altitude+20000*hStep);}
    else if(rem<15){tg.curSpeed=tg.speed*1.1;tg.altitude=Math.max(0,tg.altitude-(tg.targetAlt/(15/(tg.curSpeed*hStep))));}
    else{tg.curSpeed=tg.speed;tg.altitude=tg.targetAlt;}
    tg.prog+=tg.curSpeed*hStep; tg.currentPos=Phys.interp(tg.path,tg.prog);
    tg.marker.setLatLng(tg.currentPos);
    const a=Phys.heading(prev,tg.currentPos),ic=tg.marker.getElement()?.querySelector('.rotated-icon');
    if(ic)ic.style.transform=`rotate(${a}deg)`;
    tg.history.push([...tg.currentPos]);tg.passed.setLatLngs(tg.history);
    if(tg.prog>=tg.total){tg.altitude=0;markEvent(tg.currentPos,'hit');leakMark(tg.currentPos);addHist(tg.name,'hit',tg.currentPos);
      state.stats.leaks++; note(tg.currentPos,`${t('n_hit')}: ${tg.name}`,'#ff4444'); removeObj(tg,true);}
  });

  // movers (fighters/ships/mrg) + engagement
  state.def.forEach(s=>{
    if(s.type==='fighter'){
      if(map.distance(s.currentPos,s.patrol)<1000)s.patrol=[47+(Math.random()-.5)*4,30+Math.random()*5];
      moveTo(s,s.patrol,s.cfg.speed,hStep,-45,'var(--ua-gold)');
    } else if(s.type==='ship'){
      if(map.distance(s.currentPos,s.patrol)<5000)s.patrol=[45+(Math.random()-.5),32+Math.random()*5];
      moveTo(s,s.patrol,s.cfg.speed,hStep,0,'var(--ua-gold)');
    } else if(s.type==='mrg'){
      s.curSpeed=s.cfg.speed;s.prog+=s.curSpeed*hStep;if(s.prog>=s.total)s.prog=0;
      s.currentPos=Phys.interp(s.path,s.prog);s.marker.setLatLng(s.currentPos);
    }
    if(['sam','mrg','fighter','ship','hub'].includes(s.type)) tryEngage(s);
  });

  // interceptors
  state.missiles=state.missiles.filter(m=>{
    if(!m.target.active){m.marker.remove();m.line.remove();m.tb.remove();return false;}
    const prev=[...m.pos], d=map.distance(m.pos,m.target.currentPos);
    if(d<500){ // reached target: roll Pk
      const rngKm=map.distance(m.launcher.pos||m.launcher.currentPos,m.target.currentPos)/1000;
      const pk=Phys.pk(m.launcher,m.target,rngKm);
      if(Math.random()<pk){
        markEvent(m.target.currentPos,'intercept'); addHist(m.target.name,'intercept',m.target.currentPos);
        state.stats.kills++; note(m.target.currentPos,`${t('n_killed')}: ${m.target.name}`,'#00ff88'); removeObj(m.target,true);
      } else { // miss → free channel, allow re-engage
        addHist(m.target.name,'miss',m.target.currentPos); m.target.engagedBy.delete(m.launcherId); Snd.warn();
      }
      m.marker.remove();m.line.remove();m.tb.remove();return false;
    }
    m.curSpeed=Math.min(m.speed*1.5,(m.curSpeed||m.speed)+2000*hStep*10);
    const move=(m.curSpeed*hStep*1000)/d;
    m.pos=[m.pos[0]+(m.target.currentPos[0]-m.pos[0])*move, m.pos[1]+(m.target.currentPos[1]-m.pos[1])*move];
    m.marker.setLatLng(m.pos);
    const a=Phys.heading(prev,m.pos),ic=m.marker.getElement()?.querySelector('.rotated-icon');if(ic)ic.style.transform=`rotate(${a+45}deg)`;
    m.history.push([...m.pos]);m.line.setLatLngs(m.history);return true;
  });

  state.simSeconds+=dt*state.tc; clock();
  state._uiAcc=(state._uiAcc||0)+dt;
  if(state._uiAcc>=0.16){state._uiAcc=0; syncTb(); dash();}
  requestAnimationFrame(simLoop);
}
function moveTo(s,target,speed,hStep,iconAdj,color){
  const prev=[...s.currentPos], dist=map.distance(s.currentPos,target);
  s.curSpeed=speed; const move=(s.curSpeed*hStep*1000)/Math.max(1,dist);
  s.currentPos=[s.currentPos[0]+(target[0]-s.currentPos[0])*move, s.currentPos[1]+(target[1]-s.currentPos[1])*move];
  s.marker.setLatLng(s.currentPos);
  const a=Phys.heading(prev,s.currentPos),ic=s.marker.getElement()?.querySelector('.rotated-icon');
  if(ic)ic.style.transform=`rotate(${a+(s.cfg.iconAdj??iconAdj)}deg)`;
  s.history.push([...s.currentPos]);if(s.history.length>50)s.history.shift();s.line.setLatLngs(s.history);
}

function removeObj(o,keepPath=false){
  o.active=false; if(o.marker)map.removeLayer(o.marker); if(o.tb)o.tb.remove();
  if(!keepPath){if(o.line)map.removeLayer(o.line);if(o.passed)map.removeLayer(o.passed);if(o.future)map.removeLayer(o.future);}
  counters();
}

/* ---------- TOOLBARS ---------- */
function syncTb(){
  state.targets.forEach(tg=>{if(!tg.active)return;
    const ic=tg.marker.getElement()?.querySelector('.rotated-icon');
    if(ic)ic.classList.toggle('target-engaged', tg.engagedBy && tg.engagedBy.size>0);
    setTb(tg,`<b>${tg.name}</b><br>${t('tip_spd')}: ${Math.round(tg.curSpeed)} км/год<br>${t('tip_alt')}: ${Math.round(tg.altitude)} м${tg.detected?`<br><span class="ok">${t('tip_detected')}</span>`:''}`);});
  state.def.forEach(s=>{
    let html='';
    const reloading=s.reloadUntil>state.simSeconds;
    const ammoLine=(s.cfg.mag!=null)?`<br>${t('tip_ammo')}: ${s.ammo}/${s.cfg.mag}`:'';
    const reloadLine=reloading?`<br><span class="reload">${t('tip_reload')}</span>`:'';
    if(s.type==='sam') html=`<b style="color:var(--primary)">${s.cfg.name}</b>${ammoLine}${reloadLine}`;
    else if(s.type==='fighter') html=`<b style="color:var(--ua-gold)">${s.cfg.name}</b><br>${t('tip_spd')}: ${Math.round(s.curSpeed)} км/год${ammoLine}${reloadLine}`;
    else if(s.type==='ship') html=`<b style="color:var(--ua-gold)">${s.cfg.name}</b>${ammoLine}${reloadLine}`;
    else if(s.type==='mrg') html=`<b style="color:var(--mobile)">${s.cfg.name}</b>${ammoLine}${reloadLine}`;
    else if(s.type==='sensor') html=`<b style="color:var(--sensor)">${s.cfg.name}</b>`;
    else if(s.type==='jammer') html=`<b style="color:var(--jam)">${s.cfg.name}</b>`;
    else if(s.type==='hub') html=`<b style="color:var(--primary)">${s.cfg.name}</b>${ammoLine}${reloadLine}`;
    if(html)setTb(s,html);
  });
  state.missiles.forEach(m=>{if(!m.target.active)return;const p=map.latLngToContainerPoint(m.pos);m.tb.style.left=p.x+'px';m.tb.style.top=p.y+'px';m.tb.innerHTML=`${Math.round(m.curSpeed)} км/год`;});
  state.carriers.forEach(c=>{const p=map.latLngToContainerPoint(c.pos);c.tb.style.left=p.x+'px';c.tb.style.top=p.y+'px';});
}

/* ---------- HISTORY ---------- */
function addHist(name,type,pos){state.history.push({time:simTimeStr(),name,type,pos});Snd.ping();
  if(document.getElementById('histPanel').classList.contains('active'))renderHist();nav();}
function renderHist(){
  const b=document.getElementById('histBody');b.innerHTML='';
  state.history.slice().reverse().forEach(e=>{
    const tr=document.createElement('tr');tr.onclick=()=>{map.flyTo(e.pos,9);Snd.ping();};
    const cls={deploy:'b-deploy',launch:'b-launch',intercept:'b-intercept',hit:'b-hit',miss:'b-miss',ew:'b-miss'}[e.type];
    tr.innerHTML=`<td style="color:#889;font-family:monospace">${e.time}</td><td style="font-weight:700">${e.name}</td>
      <td><span class="badge ${cls}">${t('st_'+e.type)}</span></td>
      <td style="color:#aaa;font-size:9px">${e.pos[0].toFixed(2)}, ${e.pos[1].toFixed(2)}</td>`;
    b.appendChild(tr);
  });
}

/* ---------- DASHBOARD ---------- */
function dash(){
  const s=state.stats, attempts=s.kills+s.leaks;
  const rate=attempts?Math.round(100*s.kills/attempts):0;
  document.getElementById('dRate').textContent=attempts?rate+'%':'—';
  document.getElementById('dRateBar').style.width=rate+'%';
  document.getElementById('dLeak').textContent=s.leaks;
  document.getElementById('dShots').textContent=s.shots;
  let used=0,total=0; state.def.forEach(x=>{if(['sam','mrg','fighter','ship','hub'].includes(x.type)){total+=x.cfg.ch||1;used+=activeChannels(x);}});
  document.getElementById('dChan').textContent=`${used}/${total}`;
  document.getElementById('dChanBar').style.width=total?Math.round(100*used/total)+'%':'0';
  document.getElementById('dCostDef').textContent='$'+s.costDef.toFixed(2)+'M';
  document.getElementById('dCostThreat').textContent='$'+s.costThreat.toFixed(2)+'M';
}

/* ---------- WAVES (mass strike) ---------- */
function triggerWave(){
  if(state.attackActive)return; Snd.alert(); state.attackActive=true; state.waveNo++;
  document.getElementById('attackBtn').disabled=true;
  const ua=[[50.45,30.52],[49.83,24.02],[46.48,30.72],[48.46,35.04],[49.99,36.23],[49.75,27.22],[49.23,28.46],[46.97,31.99],[50.74,25.32],[48.92,24.71],[48.37,31.16],[51.5,31.29]];
  const z={blackSea:[44.5,33.5],caspian:[47.5,43.5],belgorod:[50.6,36.6],crimea:[45.1,34],kursk:[51.7,36.1],belarus:[52.1,26.5]};
  const rUA=()=>ua[Math.floor(Math.random()*ua.length)];
  const n=state.waveNo, droneN=6+n*3, kalibrN=2+n, ballN=Math.min(n,3);
  note(map.getCenter(),`${t('n_wave')} ${n}`,'#ff4444');
  showCarrier(z.crimea,"SHAHED HUB","fa-warehouse"); showCarrier(z.blackSea,"FLEET","fa-ship");
  showCarrier(z.belgorod,"ISKANDER","fa-truck-monster"); if(n>1)showCarrier(z.caspian,"TU-95MS","fa-fighter-jet");
  for(let i=0;i<droneN;i++)setTimeout(()=>{const st=Math.random()>.5?z.crimea:z.belgorod;spawnTarget('t_shahed',[st,[47+Math.random(),33+Math.random()],rUA()]);},i*700);
  setTimeout(()=>{for(let i=0;i<kalibrN;i++)spawnTarget('t_kalibr',[z.blackSea,rUA()]);},5000);
  setTimeout(()=>{for(let i=0;i<ballN;i++)spawnTarget('t_iskander',[z.belgorod,rUA()]);
    spawnTarget('t_x101',[z.caspian,[50,38],rUA()]); if(n>=2)spawnTarget('t_kinzhal',[z.belarus,rUA()]);},11000);
  if(!state.sim){state.sim=true;state.lastFrame=performance.now();requestAnimationFrame(simLoop);nav();}
}
function showCarrier(pos,name,icon){
  const m=L.marker(pos,{icon:L.divIcon({html:`<div class="static-icon"><i class="fas ${icon}" style="color:var(--ru-red);font-size:22px;filter:drop-shadow(0 0 5px red)"></i></div>`,className:'event-marker'})}).addTo(map);
  const tb=tbEl();tb.innerHTML=`<b style="color:var(--ru-red)">${name}</b>`;state.carriers.push({marker:m,tb,pos});
}

/* ---------- SAVE / LOAD ---------- */
function saveLayout(){
  const data=state.def.map(s=>({id:Object.keys(CONFIG.def).find(k=>CONFIG.def[k]===s.cfg),
    type:s.type, pos:s.pos||s.currentPos, path:s.path||null}));
  const blob=new Blob([JSON.stringify({version:1,lang:LANG,units:data},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='radar-ua-layout.json';a.click();
  note(map.getCenter(),t('n_saved'),'var(--ua-gold)');
}
function loadLayout(ev){
  const f=ev.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{try{const j=JSON.parse(r.result);
    (j.units||[]).forEach(u=>{const c=CONFIG.def[u.id];if(!c)return;
      document.getElementById('defSelect').value=u.id;
      if(u.type==='mrg'&&u.path){state.pending=u.path;mkMRG(c);state.pending=[];}
      else deploy(u.pos);});
    note(map.getCenter(),t('n_loaded'),'#00ff88');
  }catch(e){Snd.warn();}};
  r.readAsText(f); ev.target.value='';
}

/* ---------- UI / NAV ---------- */
function setMode(m){Snd.ping();state.mode=m;
  document.getElementById('defCard').classList.toggle('active',m==='def');
  document.getElementById('targetCard').classList.toggle('active',m==='target');
  resetSelection();nav();}
function toggleAI(){Snd.ping();state.ai=!state.ai;document.getElementById('aiChip').classList.toggle('on',state.ai);}
function resetSelection(){state.temp.forEach(m=>map.removeLayer(m));state.temp=[];state.pending=[];
  if(state.futureLine){state.futureLine.remove();state.futureLine=null;}
  if(state.rangeCircle){state.rangeCircle.remove();state.rangeCircle=null;}nav();}
function counters(){
  document.getElementById('cAir').textContent=state.targets.filter(x=>x.active).length;
  document.getElementById('cSam').textContent=state.def.filter(x=>['sam','mrg'].includes(x.type)).length;
  document.getElementById('cSensor').textContent=state.def.filter(x=>['sensor','jammer','hub'].includes(x.type)).length;
  document.getElementById('cKill').textContent=state.stats.kills;
  document.getElementById('cLeak').textContent=state.stats.leaks;
  if(state.targets.filter(x=>x.active).length===0&&state.attackActive){
    state.attackActive=false;document.getElementById('attackBtn').disabled=false;
    state.carriers.forEach(c=>{c.marker.remove();c.tb.remove();});state.carriers=[];
  }
}
function undoLast(){Snd.ping();
  if(state.pending.length>0){state.pending.pop();const m=state.temp.pop();if(m)map.removeLayer(m);
    if(state.futureLine){state.pending.length?state.futureLine.setLatLngs(state.pending):(state.futureLine.remove(),state.futureLine=null);}
    if(!state.pending.length&&state.rangeCircle){state.rangeCircle.remove();state.rangeCircle=null;}}
  else if(state.history.length>0){const last=state.history.pop();
    const i=state.def.findIndex(o=>o.cfg.name===last.name);
    if(i!==-1){const o=state.def[i];if(o.layers)o.layers.forEach(l=>map.removeLayer(l));else removeObj(o);if(o.tb)o.tb.remove();state.def.splice(i,1);}}
  counters();nav();}
function toggleHist(){Snd.ping();const p=document.getElementById('histPanel');const on=p.classList.toggle('active');
  document.getElementById('histBtn').classList.toggle('active',on);document.getElementById('dashPanel').classList.remove('active');if(on)renderHist();}
function toggleDash(){Snd.ping();const p=document.getElementById('dashPanel');const on=p.classList.toggle('active');
  document.getElementById('histPanel').classList.remove('active');if(on)dash();}

map.on('click',e=>{Snd.init();Snd.ping();const pos=[e.latlng.lat,e.latlng.lng];
  if(state.mode==='def'){
    const id=document.getElementById('defSelect').value;
    if(CONFIG.def[id].type==='mrg'){
      state.pending.push(pos);state.temp.push(L.circleMarker(pos,{radius:4,color:CL.mobile}).addTo(map));
      if(state.futureLine)state.futureLine.remove();
      state.futureLine=L.polyline(state.pending,{color:CL.mobile,weight:1,dashArray:'5,8',opacity:.5}).addTo(map);
    } else deploy(pos);
  } else {
    const id=document.getElementById('targetSelect').value,c=CONFIG.tgt[id];
    if(state.pending.length===0){state.pending.push(pos);state.temp.push(L.circleMarker(pos,{radius:4,color:'#fff'}).addTo(map));}
    else{state.pending.push(pos);state.temp.push(L.circleMarker(pos,{radius:4,color:'#fff'}).addTo(map));
      if(state.futureLine)state.futureLine.remove();
      state.futureLine=L.polyline(state.pending,{color:'#fff',weight:1,dashArray:'5,8',opacity:.5}).addTo(map);}
  }
  nav();
});

document.getElementById('playBtn').onclick=()=>{Snd.init();
  if(state.pending.length>0){Snd.ping();
    if(state.mode==='def'){const id=document.getElementById('defSelect').value;
      if(state.pending.length>=2||CONFIG.def[id].type!=='mrg')deploy(state.pending[0]);}
    else if(state.pending.length>=2)spawnTarget();
  } else {
    state.sim=!state.sim;state.lastFrame=performance.now();
    if(state.sim){Snd.alert();requestAnimationFrame(simLoop);note(map.getCenter(),t('n_simOn'),'#00ff88');}
    else{Snd.ping();syncTb();note(map.getCenter(),t('n_pause'),'var(--ua-gold)');}
  }
  nav();
};

function nav(){
  const btn=document.getElementById('playBtn'),undo=document.getElementById('undoBtn'),attack=document.getElementById('attackBtn');
  undo.classList.toggle('show',state.pending.length>0||state.history.length>0);
  attack.style.display=state.sim?'flex':'none';
  if(state.pending.length>0){btn.innerHTML='<i class="fas fa-check"></i>';btn.className='btn confirm';}
  else{btn.innerHTML=state.sim?'<i class="fas fa-pause"></i>':'<i class="fas fa-play"></i>';btn.className='btn';btn.classList.toggle('sim',state.sim);}
}
map.on('move',syncTb); map.on('zoomend',syncTb);
map.on('zoom',()=>{state.def.forEach(s=>{if(s.type==='sam'){const px=radarPx(s.cfg.kill,s.pos[0]);
  const el=s.layers[0].getElement();if(el){const sw=el.querySelector('.radar-sweep');if(sw){sw.style.width=px+'px';sw.style.height=px+'px';}}}});});

function simTimeStr(){const now=state.sim?new Date(state.baseTime.getTime()+state.simSeconds*1000):new Date();
  return [now.getHours(),now.getMinutes(),now.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');}
function clock(){document.getElementById('simTime').textContent=simTimeStr();}

/* ---------- BOOT ---------- */
buildSelectors(); applyI18n(); clock(); setInterval(clock,1000); nav();

window.addEventListener('load', ()=>setTimeout(fixMapSize,200));
window.addEventListener('resize', fixMapSize);
window.addEventListener('orientationchange', ()=>setTimeout(fixMapSize,300));
setTimeout(fixMapSize, 600);
